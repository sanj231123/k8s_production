name: EKS Production CI/CD

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - uses: hashicorp/setup-terraform@v3

    - run: terraform init
    - run: terraform apply -auto-approve

    - name: Login to ECR
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        aws ecr get-login-password --region us-east-1 | \
        docker login --username AWS --password-stdin \
        $ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com

    - name: Build & Push
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        IMAGE=$ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/mahakal-nginx-repo:latest
        docker pull nginx
        docker tag nginx:latest $IMAGE
        docker push $IMAGE
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV

    - run: aws eks update-kubeconfig --name mahakal-cluster --region us-east-1

    - run: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml

    - run: sed -i "s|IMAGE_PLACEHOLDER|$IMAGE|g" k8s/deployment.yml

    - run: |
        kubectl apply -f k8s/namespace.yml
        kubectl apply -f k8s/deployment.yml
        kubectl apply -f k8s/service.yml
        kubectl apply -f k8s/ingress.yml
        kubectl apply -f k8s/hpa.yml
